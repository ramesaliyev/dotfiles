# Reload: tmux source-file ~/.tmux.conf

# Use Ctrl-Space as the prefix key instead of Ctrl-B
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support (click panes, scroll)
set -g mouse on

# Start windows and panes at 1, not 0 (easier to reach on keyboard)
set -g base-index 1
set -g pane-base-index 1

# Longer scrollback history
set -g history-limit 10000

# Sync panes with ctrl+a ctrl+s
# Ctrl+a then S (capital, no conflict)
bind S setw synchronize-panes \; display "sync: #{?pane_synchronized,ON,OFF}"

# Plugin manager — TPM must be installed first on fresh machines; see dotfiles/tmux/README.md
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Your plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'erikw/tmux-powerline'

# Continuum config
set -g @continuum-restore 'on'        # auto-restore on tmux start
set -g @continuum-save-interval '10'  # save every 10 minutes

# TPM init — must be last line
run '~/.tmux/plugins/tpm/tpm'
